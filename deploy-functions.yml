name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:  # allow manual trigger from Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is missing"
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF secret is missing"
            exit 1
          fi

      - name: List functions to deploy
        id: list
        run: |
          cd supabase/functions
          FUNCS=$(ls -d */ 2>/dev/null | grep -v '_shared' | sed 's|/||' | tr '\n' ' ')
          echo "Functions found: $FUNCS"
          echo "funcs=$FUNCS" >> "$GITHUB_OUTPUT"

      - name: Deploy each function
        run: |
          for fn in ${{ steps.list.outputs.funcs }}; do
            echo "::group::Deploying $fn"
            supabase functions deploy "$fn" \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --no-verify-jwt
            echo "::endgroup::"
          done

      - name: Summary
        run: |
          echo "### Deployed functions" >> "$GITHUB_STEP_SUMMARY"
          for fn in ${{ steps.list.outputs.funcs }}; do
            echo "- \`$fn\`" >> "$GITHUB_STEP_SUMMARY"
          done
