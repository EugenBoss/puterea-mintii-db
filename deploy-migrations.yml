name: Deploy Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-migrations.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN:  ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF:   ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD:   ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets
        run: |
          for v in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD; do
            if [ -z "${!v}" ]; then
              echo "::error::$v is missing from repository secrets"
              exit 1
            fi
          done

      - name: Link project
        run: |
          supabase link \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        run: supabase db push

      - name: Summary
        if: always()
        run: |
          echo "### Migrations applied" >> "$GITHUB_STEP_SUMMARY"
          ls supabase/migrations/*.sql 2>/dev/null | while read f; do
            echo "- \`$(basename "$f")\`" >> "$GITHUB_STEP_SUMMARY"
          done
